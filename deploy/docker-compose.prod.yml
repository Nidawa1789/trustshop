# Sur EC2 : /opt/trustshop/deploy/ + ../nginx/
# export WEB_IMAGE=... puis pull + up

services:
  web:
    image: ${WEB_IMAGE:?Définir WEB_IMAGE (ex. ghcr.io/org/trustshop:latest)}
    environment:
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${NEXT_PUBLIC_SANITY_PROJECT_ID}
      NEXT_PUBLIC_SANITY_DATASET: ${NEXT_PUBLIC_SANITY_DATASET}
      NEXT_PUBLIC_SANITY_API_VERSION: ${NEXT_PUBLIC_SANITY_API_VERSION}
      SANITY_API_READ_TOKEN: ${SANITY_API_READ_TOKEN}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    environment:
      NGINX_ENVSUBST_TEMPLATE_SUFFIX: .tmpl
      TRUSTSHOP_DOMAIN: ${TRUSTSHOP_DOMAIN:?Définir TRUSTSHOP_DOMAIN (ex. trustshop.example.com)}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/templates/default.conf.tmpl:/etc/nginx/templates/default.conf.tmpl:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    profiles: ["certbot"]
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot

volumes:
  letsencrypt:
  certbot-www:
