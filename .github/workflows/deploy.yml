name: CI and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

  docker-and-deploy:
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Image name (lowercase, GHCR)
        id: image
        run: |
          owner_repo="${{ github.repository }}"
          lower="${owner_repo,,}"
          echo "WEB_IMAGE=${{ env.REGISTRY }}/$lower" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.WEB_IMAGE }}:latest
            ${{ steps.image.outputs.WEB_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
            NEXT_PUBLIC_SANITY_PROJECT_ID=${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
            NEXT_PUBLIC_SANITY_DATASET=${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
            NEXT_PUBLIC_SANITY_API_VERSION=${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}
            SANITY_API_READ_TOKEN=${{ secrets.SANITY_API_READ_TOKEN }}

      # Token court-terme du workflow pour tirer l'image GHCR depuis EC2.
      - name: Deploy on EC2
        if: vars.EC2_DEPLOY == 'true'
        env:
          GHCR_PULL_USER: ${{ github.actor }}
          GHCR_PULL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_PULL_USER,GHCR_PULL_TOKEN
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ vars.EC2_DEPLOY_PATH }}"
            if [ -z "${DEPLOY_PATH}" ]; then DEPLOY_PATH="/opt/trustshop/deploy"; fi
            cd "$DEPLOY_PATH"

            if [ -n "${GHCR_PULL_TOKEN:-}" ] && [ -n "${GHCR_PULL_USER:-}" ]; then
              echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_PULL_USER" --password-stdin
            fi

            NEW_IMAGE="${{ steps.image.outputs.WEB_IMAGE }}:${{ github.sha }}"
            ROLLBACK_IMAGE=""
            if [ -f .last-successful-image ]; then
              ROLLBACK_IMAGE="$(tr -d '\r\n' < .last-successful-image)"
            fi

            check_url() {
              if command -v curl >/dev/null 2>&1; then
                curl -fsS --max-time 5 http://127.0.0.1/ >/dev/null
              else
                wget -qO- --timeout=5 http://127.0.0.1/ >/dev/null
              fi
            }

            wait_until_healthy() {
              for attempt in $(seq 1 12); do
                if check_url; then
                  echo "Healthcheck passed on attempt ${attempt}."
                  return 0
                fi

                echo "Waiting for application healthcheck (${attempt}/12)..."
                docker compose -f docker-compose.prod.yml ps
                sleep 5
              done

              return 1
            }

            deploy_image() {
              export WEB_IMAGE="$1"
              if [ "${2:-pull}" = "pull" ]; then
                docker compose -f docker-compose.prod.yml pull web
              fi
              docker compose -f docker-compose.prod.yml up -d --remove-orphans
            }

            echo "Deploying ${NEW_IMAGE}"
            if deploy_image "$NEW_IMAGE" && wait_until_healthy; then
              echo "$NEW_IMAGE" > .last-successful-image
              echo "Deployment succeeded. Stable image recorded."
              exit 0
            fi

            echo "::error::Deployment failed or healthcheck did not pass."
            if [ -z "$ROLLBACK_IMAGE" ]; then
              echo "::error::No previous stable image found. Rollback cannot run."
              exit 1
            fi

            echo "::warning::Rolling back to ${ROLLBACK_IMAGE}"
            if deploy_image "$ROLLBACK_IMAGE" "local" && wait_until_healthy; then
              echo "$ROLLBACK_IMAGE" > .last-successful-image
              echo "Rollback succeeded. Previous stable version is running."
              exit 1
            fi

            echo "::error::Rollback failed. Manual intervention required."
            exit 1
