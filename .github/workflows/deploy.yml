name: CI and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            backend/yarn.lock

      - name: Install (frontend)
        run: yarn install --frozen-lockfile

      - name: Lint (frontend)
        run: yarn lint

      - name: Install (backend)
        working-directory: backend
        run: yarn install --frozen-lockfile

      - name: Prisma generate (backend)
        working-directory: backend
        run: yarn prisma:generate

      - name: Lint (backend)
        working-directory: backend
        run: yarn lint

  docker-and-deploy:
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Image names (lowercase, GHCR)
        id: image
        run: |
          owner_repo="${{ github.repository }}"
          lower="${owner_repo,,}"
          echo "WEB_IMAGE=${{ env.REGISTRY }}/$lower" >> "$GITHUB_OUTPUT"
          echo "API_IMAGE=${{ env.REGISTRY }}/$lower-api" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.WEB_IMAGE }}:latest
            ${{ steps.image.outputs.WEB_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}

      - name: Build and push api
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.API_IMAGE }}:latest
            ${{ steps.image.outputs.API_IMAGE }}:${{ github.sha }}

      # Sur EC2 : secrets GHCR_PULL_USER + GHCR_PULL_TOKEN (PAT read:packages) si le package GHCR est privé.
      - name: Deploy on EC2
        if: vars.EC2_DEPLOY == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ vars.EC2_DEPLOY_PATH }}"
            if [ -z "${DEPLOY_PATH}" ]; then DEPLOY_PATH="/opt/trustshop/deploy"; fi
            cd "$DEPLOY_PATH"
            if [ -n "${{ secrets.GHCR_PULL_TOKEN }}" ] && [ -n "${{ secrets.GHCR_PULL_USER }}" ]; then
              echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_PULL_USER }}" --password-stdin
            fi
            export WEB_IMAGE="${{ steps.image.outputs.WEB_IMAGE }}:${{ github.sha }}"
            export API_IMAGE="${{ steps.image.outputs.API_IMAGE }}:${{ github.sha }}"
            docker compose -f docker-compose.prod.yml pull web api
            docker compose -f docker-compose.prod.yml up -d
